<style>
:root {
  --bg:      #080f08;
  --bg2:     #0c180c;
  --bg3:     #101e10;
  --surf:    #152215;
  --surf2:   #1c2e1c;
  --border:  rgba(80,180,60,.14);
  --border2: rgba(80,180,60,.28);
  --green:   #2d7a2d;
  --green2:  #3aaa3a;
  --green3:  #4dc44d;
  --gold:    #c8960c;
  --gold2:   #f0c060;
  --text:    #e0f0e0;
  --text2:   rgba(180,230,180,.58);
  --text3:   rgba(180,230,180,.3);
  --accent:  #44cc44;
  --danger:  #cc3333;
  --online:  #44dd88;
  --irc:     #ff8844;  /* colour for IRC/public messages */
  --sans:    'DM Sans', sans-serif;
  --disp:    'Syne', sans-serif;
  --rad:     13px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 55% at 10% 15%, rgba(45,122,45,.22) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 90% 85%, rgba(200,150,12,.09) 0%, transparent 60%);
}

/* ══ LOADING ══ */
#loading { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.spin { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--green3); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ AUTH ══ */
#auth { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; background: var(--bg); }
.auth-card {
  background: linear-gradient(145deg, var(--bg2), var(--bg3));
  border: 1px solid var(--border2); border-radius: 20px;
  padding: 28px 24px; width: 100%; max-width: 380px;
  box-shadow: 0 24px 80px rgba(0,0,0,.7); position: relative; z-index: 1;
}
.auth-logo { font-family: var(--disp); font-size: 30px; font-weight: 900; color: var(--gold2); text-align: center; margin-bottom: 4px; cursor: pointer; user-select: none; letter-spacing: -.5px; }
.auth-sub { text-align: center; font-size: 12px; color: var(--text2); margin-bottom: 20px; }
.auth-tabs { display: flex; background: var(--surf); border-radius: 10px; padding: 3px; margin-bottom: 18px; }
.atab { flex: 1; padding: 8px; border: none; background: none; color: var(--text2); font-family: var(--sans); font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all .2s; }
.atab.on { background: var(--green); color: #fff; }
.field { margin-bottom: 11px; }
.field label { display: block; font-size: 10px; font-weight: 800; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .6px; }
.field input, .field select { width: 100%; padding: 10px 12px; background: var(--surf); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-family: var(--sans); font-size: 14px; outline: none; transition: border .2s; }
.field input:focus, .field select:focus { border-color: var(--green3); }
.field select option { background: var(--bg2); }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.pw-wrap { position: relative; display: flex; align-items: center; }
.pw-wrap input { padding-right: 42px; }
.pw-eye { position: absolute; right: 10px; background: none; border: none; color: var(--text3); font-size: 16px; cursor: pointer; padding: 4px; line-height: 1; }
.pw-eye:hover { color: var(--text2); }
.auth-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--green), var(--green2)); border: none; border-radius: 10px; color: #fff; font-family: var(--disp); font-size: 16px; font-weight: 800; cursor: pointer; letter-spacing: .3px; transition: all .15s; margin-top: 4px; }
.auth-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.auth-btn:active { transform: translateY(0); }
.auth-err { font-size: 12px; color: #ff8888; text-align: center; margin-top: 7px; min-height: 16px; }
.auth-div { display: flex; align-items: center; gap: 10px; margin: 14px 0; font-size: 11px; color: var(--text3); }
.auth-div::before, .auth-div::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.av-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 10px; }
.av-btn { aspect-ratio: 1; border-radius: 8px; border: 2px solid transparent; background: var(--surf); font-size: 18px; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; }
.av-btn:hover { border-color: var(--green3); }
.av-btn.sel { border-color: var(--gold); background: rgba(200,150,12,.15); }

/* ══ APP ══ */
#app { display: none; height: 100%; flex-direction: column; position: relative; z-index: 1; }
#app.on { display: flex; }

/* TOPBAR */
.topbar { height: 50px; display: flex; align-items: center; gap: 8px; padding: 0 12px; flex-shrink: 0; background: var(--bg2); border-bottom: 1px solid var(--border); z-index: 50; position: relative; }
.tlogo { font-family: var(--disp); font-size: 20px; font-weight: 900; color: var(--gold2); letter-spacing: -.5px; cursor: pointer; user-select: none; flex-shrink: 0; }
.tmid { flex: 1; display: flex; align-items: center; gap: 5px; overflow: hidden; }
.rpill { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: var(--surf); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all .15s; white-space: nowrap; flex-shrink: 0; }
.rpill.on { background: var(--green); border-color: var(--green3); color: #fff; }
.rpill:hover:not(.on) { background: var(--surf2); color: var(--text); }
.rpill.live-pill { background: rgba(255,100,50,.12); border-color: rgba(255,100,50,.35); color: var(--irc); }
.rpill.live-pill:hover { background: rgba(255,100,50,.22); }
.tright { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.uchip { display: flex; align-items: center; gap: 6px; padding: 4px 10px 4px 5px; background: var(--surf); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; transition: all .15s; }
.uchip:hover { background: var(--surf2); }
.uchip-av { width: 28px; height: 28px; border-radius: 50%; background: var(--surf2); display: flex; align-items: center; justify-content: center; font-size: 16px; overflow: hidden; flex-shrink: 0; }
.uchip-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.uchip-name { font-size: 12px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; }

/* BODY */
.app-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* SIDEBAR */
.sidebar { width: 185px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
@media (max-width: 680px) { .sidebar { display: none; } }
.sb-scroll { flex: 1; overflow-y: auto; padding: 6px 0; }
.sb-scroll::-webkit-scrollbar { width: 3px; }
.sb-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.sb-grp { font-size: 10px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 10px 12px 4px; }
.sb-r { display: flex; align-items: center; gap: 7px; padding: 7px 10px; border-radius: 8px; border: none; background: none; color: var(--text2); font-family: var(--sans); font-size: 12px; font-weight: 500; width: 100%; text-align: left; cursor: pointer; transition: all .15s; }
.sb-r:hover { background: var(--surf); color: var(--text); }
.sb-r.on { background: var(--green); color: #fff; }
.sb-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.sb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-cnt { font-size: 10px; opacity: .6; flex-shrink: 0; }
.sb-live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--irc); animation: livepulse 1.8s infinite; flex-shrink: 0; }
@keyframes livepulse { 0%,100% { opacity:1;transform:scale(1); } 50% { opacity:.4;transform:scale(.7); } }
.sb-div { height: 1px; background: var(--border); margin: 6px 10px; }
.sb-out button { width: 100%; margin: 8px; width: calc(100% - 16px); padding: 7px; background: rgba(200,50,50,.15); border: 1px solid rgba(200,50,50,.3); color: #ff8888; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: var(--sans); }

/* CHAT AREA */
.chat-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.banner { display: flex; align-items: center; gap: 10px; padding: 9px 14px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ban-av { font-size: 22px; flex-shrink: 0; }
.ban-info { flex: 1; min-width: 0; }
.ban-name { font-size: 14px; font-weight: 800; color: var(--text); }
.ban-sub { font-size: 11px; color: var(--text2); }
.ban-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.ban-badge.live { color: var(--irc); background: rgba(255,136,68,.12); border: 1px solid rgba(255,136,68,.3); }
.ban-badge.bc { color: var(--online); background: rgba(68,221,136,.1); border: 1px solid rgba(68,221,136,.25); }

/* MESSAGES */
.msgs { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 1px; scroll-behavior: smooth; }
.msgs::-webkit-scrollbar { width: 4px; }
.msgs::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* Message row */
.msg-row { display: flex; align-items: flex-start; gap: 9px; padding: 4px 6px; border-radius: 10px; transition: background .15s; }
.msg-row:hover { background: rgba(255,255,255,.03); }
.msg-row.mine { flex-direction: row-reverse; }
.msg-av { width: 36px; height: 36px; border-radius: 50%; background: var(--surf2); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; overflow: hidden; cursor: pointer; }
.msg-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.msg-av.irc-av { border-color: rgba(255,136,68,.35); background: rgba(255,136,68,.1); }
.msg-av.bot-av { border-color: rgba(150,80,220,.35); background: rgba(150,80,220,.1); }
.msg-bub { flex: 1; min-width: 0; max-width: 85%; }
.msg-row.mine .msg-bub { align-items: flex-end; display: flex; flex-direction: column; }
.msg-meta { display: flex; align-items: baseline; gap: 6px; margin-bottom: 3px; flex-wrap: wrap; }
.msg-row.mine .msg-meta { flex-direction: row-reverse; }
.msg-name { font-size: 12px; font-weight: 800; cursor: pointer; }
.msg-name:hover { text-decoration: underline; }
.msg-time { font-size: 10px; color: var(--text3); }
.msg-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 800; }
.badge-irc { background: rgba(255,136,68,.2); color: var(--irc); }
.badge-bot { background: rgba(150,80,220,.25); color: #cc88ff; }
.badge-bc  { background: rgba(68,204,68,.2); color: var(--accent); }
.bubble { display: inline-block; padding: 8px 12px; background: var(--surf2); border: 1px solid var(--border); border-radius: 4px var(--rad) var(--rad) var(--rad); font-size: 14px; line-height: 1.5; color: var(--text); word-break: break-word; max-width: 100%; }
.msg-row.mine .bubble { background: linear-gradient(135deg, var(--green), rgba(45,122,45,.85)); border-color: rgba(80,180,60,.35); color: #fff; border-radius: var(--rad) 4px var(--rad) var(--rad); }
.msg-row.irc-msg .bubble { background: linear-gradient(135deg, rgba(255,136,68,.14), rgba(255,100,50,.08)); border-color: rgba(255,136,68,.2); }
.msg-row.bot-msg .bubble { background: linear-gradient(135deg, rgba(150,80,220,.16), rgba(100,50,180,.1)); border-color: rgba(150,80,220,.25); }
.bubble a { color: var(--green3); text-decoration: none; }
.bubble a:hover { text-decoration: underline; }

/* Typing / system */
.typing-row { height: 20px; padding: 0 14px; display: flex; align-items: center; font-size: 11px; color: var(--text3); font-style: italic; flex-shrink: 0; }
.tdots span { animation: blink 1.4s infinite both; }
.tdots span:nth-child(2) { animation-delay: .2s; }
.tdots span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100% { opacity:.2; } 40% { opacity:1; } }
.sys-msg { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0; font-style: italic; }

/* IRC source badge */
.irc-source { font-size: 10px; color: var(--irc); font-weight: 700; margin-top: 3px; opacity: .7; }

/* INPUT BAR */
.input-bar { padding: 10px 12px; background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0; }
.input-toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
.fmt-btn { padding: 3px 9px; background: var(--surf); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--sans); transition: all .15s; }
.fmt-btn:hover { background: var(--surf2); color: var(--text); }
.fmt-btn.on { background: var(--green); border-color: var(--green3); color: #fff; }
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-wrap { flex: 1; background: var(--surf); border: 1px solid var(--border); border-radius: 13px; padding: 9px 13px; display: flex; align-items: flex-end; gap: 8px; transition: border .2s; }
.input-wrap:focus-within { border-color: var(--green3); background: var(--surf2); }
#msginput { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--sans); font-size: 14px; resize: none; min-height: 22px; max-height: 100px; line-height: 1.45; }
#msginput::placeholder { color: var(--text3); }
.eq-btns { display: flex; gap: 3px; flex-shrink: 0; }
.eq { background: none; border: none; font-size: 18px; cursor: pointer; opacity: .5; transition: opacity .15s; line-height: 1; padding: 1px; }
.eq:hover { opacity: 1; }
.send-btn { width: 40px; height: 40px; border-radius: 12px; background: var(--green); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
.send-btn:hover { background: var(--green2); transform: scale(1.05); }
.send-btn:active { transform: scale(.95); }
.input-status { font-size: 10px; color: var(--text3); padding: 3px 2px 0; display: flex; align-items: center; gap: 8px; }
.sending-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--irc); display: none; animation: livepulse 1s infinite; }
.sending-dot.on { display: inline-block; }

/* ONLINE USERS PANEL */
.users-panel { width: 160px; flex-shrink: 0; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
@media (max-width: 900px) { .users-panel { display: none; } }
.up-hdr { padding: 10px 12px 6px; font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.up-list { flex: 1; overflow-y: auto; padding: 6px; }
.up-list::-webkit-scrollbar { width: 3px; }
.up-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.up-user { display: flex; align-items: center; gap: 7px; padding: 5px 6px; border-radius: 8px; cursor: pointer; transition: background .15s; }
.up-user:hover { background: var(--surf); }
.up-av { font-size: 14px; width: 24px; text-align: center; flex-shrink: 0; }
.up-name { font-size: 11px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.up-op { font-size: 10px; color: var(--gold2); flex-shrink: 0; }

/* OVERLAYS */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 500; display: none; align-items: center; justify-content: center; padding: 16px; }
.ov.on { display: flex; }
.ov-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: 18px; padding: 22px; width: 100%; max-width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,.7); max-height: 90vh; overflow-y: auto; }
.ov-card h3 { font-family: var(--disp); font-size: 18px; font-weight: 800; color: var(--gold2); margin-bottom: 14px; }
.ov-card::-webkit-scrollbar { width: 3px; }
.ov-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Drawer */
.drawer { position: fixed; inset: 0; z-index: 400; background: var(--bg2); display: none; flex-direction: column; }
.drawer.on { display: flex; }
.drawer-hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.drawer-title { font-family: var(--disp); font-size: 18px; font-weight: 800; color: var(--gold2); }
.drawer-close { background: var(--surf); border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.drawer-body { flex: 1; overflow-y: auto; padding: 10px; }

/* Mobile nav */
.mnav { display: none; background: var(--bg2); border-top: 1px solid var(--border); padding: 5px 4px; flex-shrink: 0; }
@media (max-width: 680px) { .mnav { display: flex; justify-content: space-around; } .tmid { display: none; } }
.mn-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--text3); cursor: pointer; font-family: var(--sans); font-size: 10px; font-weight: 700; padding: 5px 10px; border-radius: 8px; transition: all .15s; }
.mn-btn.on { color: var(--accent); }
.mn-icon { font-size: 19px; }

/* Toast */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surf2); border: 1px solid var(--border2); color: var(--text); padding: 10px 22px; border-radius: 30px; font-size: 13px; font-weight: 600; z-index: 9999; display: none; box-shadow: 0 8px 32px rgba(0,0,0,.5); white-space: nowrap; pointer-events: none; }

/* IRC notice bar */
.irc-notice { background: linear-gradient(135deg, rgba(255,136,68,.12), rgba(255,100,50,.06)); border-bottom: 1px solid rgba(255,136,68,.2); padding: 7px 14px; font-size: 11px; color: var(--irc); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.irc-notice-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--irc); animation: livepulse 1.5s infinite; flex-shrink: 0; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>

<body>

<div id="loading">
  <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:900;color:var(--gold2)">🇬🇧 BritChat</div>
  <div class="spin"></div>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-card">
    <div class="auth-logo" id="logo-tap">🇬🇧 BritChat</div>
    <div class="auth-sub">Free UK Chat · Live IRC rooms with real people</div>

    <div class="auth-tabs">
      <button class="atab on" id="ti" onclick="swTab('in')">Sign In</button>
      <button class="atab" id="tu" onclick="swTab('up')">Register</button>
    </div>

    <!-- SIGN IN -->
    <div id="fi">
      <div class="field"><label>Username</label>
        <input id="su" placeholder="your_username" autocapitalize="none" autocomplete="username">
      </div>
      <div class="field"><label>Password</label>
        <div class="pw-wrap">
          <input id="sp" type="password" placeholder="••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doIn()">
          <button class="pw-eye" type="button" onclick="togglePw('sp',this)">👁</button>
        </div>
      </div>
      <button class="auth-btn" onclick="doIn()">Sign In →</button>
      <div class="auth-err" id="se"></div>
    </div>

    <!-- REGISTER -->
    <div id="fu" style="display:none">
      <div class="field"><label>Username</label>
        <input id="ru" placeholder="choose_username" autocapitalize="none">
      </div>
      <div class="field"><label>Password</label>
        <div class="pw-wrap">
          <input id="rp" type="password" placeholder="at least 4 characters">
          <button class="pw-eye" type="button" onclick="togglePw('rp',this)">👁</button>
        </div>
      </div>
      <div class="field"><label>Confirm Password</label>
        <input id="rp2" type="password" placeholder="repeat password" onkeydown="if(event.key==='Enter')doUp()">
      </div>
      <div class="frow">

<script>
/* ════════════════════════════════════════════════════════════
   BRITCHAT — IRC Bridge Edition
   
   Architecture:
   ─────────────
   BritChat rooms   → Firebase /bc_msgs/roomid  (our beautiful UI)
   IRC public rooms → /api/irc-bridge polls irc.icq-chat.com
                      Messages saved to Firebase too
                      When user sends → /api/irc-bridge posts to IRC
   
   IRC Server: irc.icq-chat.com:6667
   Channel:    #ICQchat (plus others)
════════════════════════════════════════════════════════════ */

const FB = 'https://britchat-6faa5-default-rtdb.firebaseio.com';

/* ── ROOMS ── */
const ROOMS = [
  /* BritChat-only rooms (Firebase) */
  { id:'lobby',    name:'Lobby',         icon:'💬', desc:'Main BritChat room',          irc:false, group:'🇬🇧 BritChat' },
  { id:'pub',      name:'The Pub',        icon:'🍺', desc:'Pull up a stool',             irc:false, group:'🇬🇧 BritChat' },
  { id:'sport',    name:'Sport',          icon:'⚽', desc:'Football, cricket & more',    irc:false, group:'🇬🇧 BritChat' },
  { id:'dating',   name:'Dating & Chat',  icon:'💞', desc:'Meet new people',             irc:false, group:'🇬🇧 BritChat' },
  { id:'gaming',   name:'Gaming',         icon:'🎮', desc:'Console, PC & mobile',        irc:false, group:'🇬🇧 BritChat' },
  { id:'over30s',  name:'30s & Over',     icon:'🎯', desc:'Chat for the grown-ups',      irc:false, group:'🇬🇧 BritChat' },
  /* IRC bridged rooms — real people from ICQChat */
  { id:'irc_main',  name:'Main Chat',     icon:'🌍', desc:'Real people worldwide — live IRC!', irc:true,  ircChan:'#ICQchat',       group:'🔴 Live IRC' },
  { id:'irc_30s',   name:'30s Chat',      icon:'🎯', desc:'Thirty somethings on IRC',         irc:true,  ircChan:'#30something',    group:'🔴 Live IRC' },
  { id:'irc_40s',   name:'40s Chat',      icon:'🎪', desc:'Forty somethings on IRC',          irc:true,  ircChan:'#40something',    group:'🔴 Live IRC' },
  { id:'irc_fun',   name:'Fun Chat',      icon:'😂', desc:'Fun & games on IRC',               irc:true,  ircChan:'#FunChat',        group:'🔴 Live IRC' },
  { id:'irc_night', name:'Night Owls',    icon:'🌙', desc:'Night owls on IRC',                irc:true,  ircChan:'#NightOwls',      group:'🔴 Live IRC' },
];

const AVEMOJIS = ['🐒','🦍','😎','🤠','🧐','😏','👑','💎','🎩','🃏','🌟','🔥','💀','👾','🦊','🐻','🎭','🤖','🏋️','🧙','🦁','🐯','🐺','🎅','🧛','🤴','👸','🧝','🎸','🎵'];

let me = null;
let curRoom = 'lobby';
let msgInterval = null;
let typingInterval = null;
let ircInterval = null;
let presenceInterval = null;
let typingTimer = null;
let lastMsgTs = 0;
let lastIrcFetch = 0;
let fmt = { bold:false, italic:false, underline:false };
let regPhoto = null;
let ircUsers = [];

/* ══ INIT ══ */
window.onload = () => {
  buildAvGrid();
  const sess = localStorage.getItem('bc_session');
  if (sess) {
    const ud = getLocal(sess);
    if (ud) { me = ud; launch(); return; }
    // Firebase fallback
    fetch(FB + '/bc_users/' + sess + '.json').then(r=>r.json()).then(d => {
      if (d && d.username) {
        me = d;
        try { localStorage.setItem('bc_user_' + sess, JSON.stringify(d)); } catch(e) {}
        launch();
      } else showAuth();
    }).catch(() => showAuth());
    return;
  }
  showAuth();
};

function getLocal(u) {
  try { const r = localStorage.getItem('bc_user_' + u); if (r) return JSON.parse(r); } catch(e) {}
  return null;
}

function showAuth() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('auth').style.display = 'flex';
}

function buildAvGrid() {
  const g = document.getElementById('av-g');
  if (!g || g.children.length) return;
  AVEMOJIS.forEach((a, i) => {
    const b = document.createElement('button');
    b.className = 'av-btn' + (i === 0 ? ' sel' : '');
    b.textContent = a; b.type = 'button';
    b.onclick = () => {
      g.querySelectorAll('.av-btn').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
      regPhoto = null;
      document.getElementById('reg-photo-ok').style.display = 'none';
    };
    g.appendChild(b);
  });
}

function handleRegPhoto(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    regPhoto = ev.target.result;
    document.getElementById('reg-photo-ok').style.display = 'block';
    document.querySelectorAll('.av-btn').forEach(x => x.classList.remove('sel'));
  };
  r.readAsDataURL(f);
}

/* ══ AUTH ══ */
function swTab(t) {
  document.getElementById('ti').classList.toggle('on', t==='in');
  document.getElementById('tu').classList.toggle('on', t==='up');
  document.getElementById('fi').style.display = t==='in' ? 'block' : 'none';
  document.getElementById('fu').style.display = t==='up' ? 'block' : 'none';
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  if (!inp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function doIn() {
  const u = document.getElementById('su').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p = document.getElementById('sp').value;
  const err = document.getElementById('se');
  if (!u || !p) { err.textContent = 'Please fill in all fields'; return; }

  const ud = getLocal(u);
  if (ud) {
    const h = btoa(unescape(encodeURIComponent(p)));
    if (ud.password === h || ud.password === btoa(p) || ud.password === p) {
      me = ud; localStorage.setItem('bc_session', u);
      document.getElementById('auth').style.display = 'none'; launch();
    } else err.textContent = 'Incorrect password';
    return;
  }
  err.textContent = 'Checking…';
  fetch(FB + '/bc_users/' + u + '.json').then(r=>r.json()).then(d => {
    if (!d) { err.textContent = 'Username not found — register first'; return; }
    const h = btoa(unescape(encodeURIComponent(p)));
    if (d.password === h || d.password === btoa(p)) {
      me = d;
      localStorage.setItem('bc_user_' + u, JSON.stringify(d));
      localStorage.setItem('bc_session', u);
      document.getElementById('auth').style.display = 'none'; launch();
    } else err.textContent = 'Incorrect password';
  }).catch(() => err.textContent = 'Connection error — try again');
}

function doUp() {
  const u = document.getElementById('ru').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p = document.getElementById('rp').value;
  const p2 = document.getElementById('rp2').value;
  const age = document.getElementById('ra').value || '';
  const sex = document.getElementById('rs').value || '';
  const loc = document.getElementById('rl').value.trim() || '';
  const av = regPhoto || document.querySelector('#av-g .av-btn.sel')?.textContent || '🐒';
  const err = document.getElementById('re');

  if (!u || u.length < 2) { err.textContent = 'Username: min 2 characters'; return; }
  if (!/^[a-z0-9_]+$/.test(u)) { err.textContent = 'Letters, numbers and _ only'; return; }
  if (!p || p.length < 4) { err.textContent = 'Password: min 4 characters'; return; }
  if (p !== p2) { err.textContent = 'Passwords do not match'; return; }
  if (localStorage.getItem('bc_user_' + u)) { err.textContent = 'Username already taken'; return; }

  const dn = u.split('_').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
  const ud = {
    username: u, name: dn,
    password: btoa(unescape(encodeURIComponent(p))),
    avatar: av, color: '#44cc44',
    joinedAt: Date.now(), age, sex, location: loc,
    friends: [], friendRequests: [],
  };
  localStorage.setItem('bc_user_' + u, JSON.stringify(ud));
  fetch(FB + '/bc_users/' + u + '.json', {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(ud)
  }).catch(() => {});
  localStorage.setItem('bc_session', u);
  me = ud;
  document.getElementById('auth').style.display = 'none'; launch();
}

function doOut() {
  stopAll();
  localStorage.removeItem('bc_session');
  me = null;
  document.getElementById('app').classList.remove('on');
  document.getElementById('auth').style.display = 'flex';
  swTab('in');
}

/* ══ LAUNCH ══ */
function launch() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').classList.add('on');
  updateChip();
  buildRooms();
  joinRoom('lobby');
  startPresence();
  setTimeout(startBots, 15000);
}

function updateChip() {
  if (!me) return;
  const av = me.avatar || '🐒';
  const avEl = document.getElementById('uc-av');
  const isPhoto = av.startsWith('data:') || av.startsWith('http');
  if (isPhoto) {
    avEl.innerHTML = `<img src="${av}" alt="av">`;
  } else {
    avEl.innerHTML = `<span id="uc-av-inner" style="font-size:16px">${av}</span>`;
  }
  document.getElementById('uc-name').textContent = me.name || me.username;
  const mn = document.getElementById('mn-av');
  if (mn) mn.textContent = isPhoto ? '📷' : av;
}

/* ══ ROOMS ══ */
function buildRooms() { buildSidebar(); buildPills(); buildDrawer(); }

function buildSidebar() {
  const el = document.getElementById('sb-list'); el.innerHTML = '';
  const groups = {};
  ROOMS.forEach(r => { if (!groups[r.group]) groups[r.group] = []; groups[r.group].push(r); });
  Object.entries(groups).forEach(([g, rooms]) => {
    const t = document.createElement('div'); t.className = 'sb-grp'; t.textContent = g; el.appendChild(t);
    rooms.forEach(r => {
      const b = document.createElement('button');
      b.className = 'sb-r' + (r.id === curRoom ? ' on' : ''); b.id = 'sbr-' + r.id;
      b.innerHTML = `<span class="sb-icon">${r.icon}</span><span class="sb-name">${r.name}</span>`
        + (r.irc ? '<div class="sb-live-dot"></div>' : `<span class="sb-cnt" id="sc-${r.id}"></span>`);
      b.onclick = () => joinRoom(r.id);
      el.appendChild(b);
    });
    const d = document.createElement('div');
    d.style.cssText = 'height:1px;background:var(--border);margin:5px 10px'; el.appendChild(d);
  });
}

function buildPills() {
  const el = document.getElementById('pills');
  const britPills = ROOMS.filter(r => !r.irc).slice(0,3).map(r =>
    `<div class="rpill${r.id===curRoom?' on':''}" id="pil-${r.id}" onclick="joinRoom('${r.id}')">${r.icon} ${r.name}</div>`
  ).join('');
  const ircPills = `<div class="rpill live-pill" onclick="joinRoom('irc_main')">🔴 Live IRC</div>`;
  el.innerHTML = britPills + ircPills;
}

function buildDrawer() {
  const el = document.getElementById('dr-list'); el.innerHTML = '';
  // IRC rooms at the top, prominent
  const ircHdr = document.createElement('div');
  ircHdr.innerHTML = `
    <div style="background:linear-gradient(135deg,rgba(255,136,68,.15),rgba(255,100,50,.05));border:1px solid rgba(255,136,68,.3);border-radius:12px;padding:10px 12px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--irc);animation:livepulse 1.5s infinite"></div>
        <div style="font-size:13px;font-weight:900;color:var(--irc)">LIVE IRC CHAT</div>
        <div style="font-size:10px;color:rgba(255,136,68,.6);background:rgba(255,80,50,.15);padding:1px 7px;border-radius:10px;margin-left:auto">Real People</div>
      </div>
      <div style="font-size:11px;color:rgba(255,136,68,.7);margin-bottom:10px">Bridged directly to irc.icq-chat.com — real strangers chatting now. Your BritChat name carries over.</div>
      ${ROOMS.filter(r=>r.irc).map(r=>`
        <div onclick="joinRoom('${r.id}');toggleDrawer()"
          style="display:flex;align-items:center;gap:10px;padding:9px 10px;background:rgba(255,80,50,.08);border:1px solid rgba(255,80,50,.2);border-radius:9px;cursor:pointer;margin-bottom:6px">
          <div style="font-size:22px">${r.icon}</div>
          <div><div style="font-size:13px;font-weight:800;color:var(--irc)">${r.name}</div>
               <div style="font-size:11px;color:rgba(255,136,68,.6)">${r.ircChan} on ICQ-Chat IRC</div></div>
          <div style="margin-left:auto;font-size:18px;color:var(--irc)">→</div>
        </div>`).join('')}
    </div>`;
  el.appendChild(ircHdr);
  // BritChat rooms
  const bcHdr = document.createElement('div');
  bcHdr.innerHTML = '<div style="font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:6px 4px 8px">🇬🇧 BritChat Rooms</div>';
  el.appendChild(bcHdr);
  ROOMS.filter(r => !r.irc).forEach(r => {
    const b = document.createElement('div');
    b.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:background .15s';
    b.innerHTML = `<div style="font-size:22px;width:30px;text-align:center">${r.icon}</div>
      <div><div style="font-size:13px;font-weight:700;color:var(--text)">${r.name}</div>
           <div style="font-size:11px;color:var(--text2)">${r.desc}</div></div>`;
    b.onmouseover = () => b.style.background = 'var(--surf)';
    b.onmouseout  = () => b.style.background = '';
    b.onclick = () => { joinRoom(r.id); toggleDrawer(); };
    el.appendChild(b);
  });
}

/* ══ JOIN ROOM ══ */
function joinRoom(id) {
  stopAll();
  const room = ROOMS.find(r => r.id === id) || ROOMS[0];
  curRoom = id;
  lastMsgTs = 0;
  lastIrcFetch = 0;

  // Update UI
  document.getElementById('ban-av').textContent = room.icon;
  document.getElementById('ban-name').textContent = room.name;
  document.getElementById('ban-sub').textContent = room.desc;
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('typing-row').innerHTML = '';
  document.getElementById('irc-notice').style.display = room.irc ? 'flex' : 'none';
  if (room.irc) {
    document.getElementById('irc-notice-text').textContent =
      `Bridged to ${room.ircChan} on ICQ-Chat IRC — real people from the internet`;
    document.getElementById('ban-badge').textContent = '🔴 Live IRC';
    document.getElementById('ban-badge').className = 'ban-badge live';
    document.getElementById('msginput').placeholder = `Message ${room.ircChan}…`;
  } else {
    document.getElementById('ban-badge').textContent = '🟢 Live';
    document.getElementById('ban-badge').className = 'ban-badge bc';
    document.getElementById('msginput').placeholder = 'Message BritChat…';
  }

  document.querySelectorAll('.sb-r').forEach(b => b.classList.toggle('on', b.id === 'sbr-' + id));
  document.querySelectorAll('.rpill').forEach(b => {
    if (b.id) b.classList.toggle('on', b.id === 'pil-' + id);
  });

  setRoomPresence(id, true);
  loadMessages(id, room);

  // Poll intervals
  msgInterval = setInterval(() => pollMessages(id, room), 3000);
  typingInterval = setInterval(() => pollTyping(id), 2500);

  if (room.irc) {
    // Also poll IRC every 5s
    ircInterval = setInterval(() => pollIRC(room), 5000);
    // Immediately fetch IRC
    fetchIRC(room);
    // Get user list
    fetchIRCUsers(room);
    setInterval(() => fetchIRCUsers(room), 30000);
  } else {
    updateRoomPresenceCount(id);
  }
}

function stopAll() {
  clearInterval(msgInterval);
  clearInterval(typingInterval);
  clearInterval(ircInterval);
  if (me && curRoom) setRoomPresence(curRoom, false);
}

/* ══ FIREBASE MESSAGES ══ */
function loadMessages(roomId, room) {
  fetch(FB + '/bc_msgs/' + roomId + '.json?orderBy="ts"&limitToLast=50')
    .then(r => r.json()).then(d => {
      if (!d) return;
      const msgs = Object.values(d).filter(Boolean).sort((a,b) => a.ts - b.ts);
      msgs.forEach(m => { if (m.ts > lastMsgTs) lastMsgTs = m.ts; renderMsg(m); });
      scrollBottom();
    }).catch(() => {});
}

function pollMessages(roomId, room) {
  if (!lastMsgTs) return;
  fetch(FB + '/bc_msgs/' + roomId + '.json?orderBy="ts"&startAt=' + (lastMsgTs+1) + '&limitToLast=20')
    .then(r => r.json()).then(d => {
      if (!d) return;
      const msgs = Object.values(d).filter(Boolean).sort((a,b) => a.ts - b.ts);
      msgs.forEach(m => { if (m.ts > lastMsgTs) { lastMsgTs = m.ts; renderMsg(m); scrollIfNear(); } });
    }).catch(() => {});
}

function pollTyping(roomId) {
  fetch(FB + '/bc_typing/' + roomId + '.json')
    .then(r => r.json()).then(d => {
      const now = Date.now();
      const typers = d ? Object.entries(d)
        .filter(([u,ts]) => u !== me?.username && (now - ts) < 4000)
        .map(([u]) => u.replace(/_/g,' ')) : [];
      const el = document.getElementById('typing-row');
      el.innerHTML = typers.length
        ? typers.join(', ') + ' typing <span class="tdots"><span>•</span><span>•</span><span>•</span></span>'
        : '';
    }).catch(() => {});
}

/* ══ IRC BRIDGE ══ */
async function fetchIRC(room) {
  try {
    setStatus('Connecting to IRC…', true);
    const res = await fetch('/api/irc-bridge', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action:'fetch', channel: room.ircChan, since: lastIrcFetch })
    });
    const data = await res.json();
    setStatus('', false);

    if (data.ok && data.messages?.length) {
      // Save IRC messages to Firebase so they persist + show in our UI
      for (const m of data.messages) {
        if (m.ts <= lastIrcFetch) continue;
        lastIrcFetch = Math.max(lastIrcFetch, m.ts);

        // Build a BritChat-style message from the IRC message
        const msg = {
          username: 'irc_' + m.nick,
          name: m.nick,
          avatar: getIRCAvatar(m.nick),
          color: getIRCColor(m.nick),
          text: m.text,
          ts: m.ts,
          source: 'irc',
          ircNick: m.nick,
          channel: room.ircChan,
          britchat: false,
        };

        // Save to Firebase
        fetch(FB + '/bc_msgs/' + curRoom + '.json', {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(msg)
        }).catch(() => {});

        // Render immediately
        renderMsg(msg);
        scrollIfNear();
      }
    }

    if (data.users?.length) {
      ircUsers = data.users;
      renderUserList(data.users);
    }
  } catch(e) {
    setStatus('IRC connection failed', false);
  }
}

async function pollIRC(room) {
  try {
    const res = await fetch('/api/irc-bridge', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action:'fetch', channel: room.ircChan, since: lastIrcFetch })
    });
    const data = await res.json();
    if (!data.ok || !data.messages?.length) return;

    for (const m of data.messages) {
      if (m.ts <= lastIrcFetch) continue;
      lastIrcFetch = Math.max(lastIrcFetch, m.ts);
      const msg = {
        username: 'irc_' + m.nick, name: m.nick,
        avatar: getIRCAvatar(m.nick), color: getIRCColor(m.nick),
        text: m.text, ts: m.ts, source: 'irc', ircNick: m.nick, channel: room.ircChan,
      };
      fetch(FB + '/bc_msgs/' + curRoom + '.json', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(msg)
      }).catch(() => {});
      renderMsg(msg);
      scrollIfNear();
    }
  } catch(e) {}
}

async function fetchIRCUsers(room) {

/* Give IRC users consistent emoji avatars based on their nick */
const IRC_EMOJIS = ['🦊','🐯','🦁','🐻','🐼','🦝','🐺','🐱','🐰','🐸','🦅','🦉','⚡','🔥','🌙','👾','🎭','🎩','💀','👑','🌟','🎯','🧙','🦸','🏄','🎸'];
function getIRCAvatar(nick) {
  let h = 0; for (let i = 0; i < nick.length; i++) h = ((h<<5)-h)+nick.charCodeAt(i);
  return IRC_EMOJIS[Math.abs(h) % IRC_EMOJIS.length];
}
const IRC_COLORS = ['#ff8844','#ff6699','#44aaff','#44ffaa','#ffaa44','#aa44ff','#ff4488','#44ffcc'];
function getIRCColor(nick) {
  let h = 0; for (let i = 0; i < nick.length; i++) h = ((h<<5)-h)+nick.charCodeAt(i);
  return IRC_COLORS[Math.abs(h) % IRC_COLORS.length];
}

/* ══ RENDER MESSAGE ══ */
function renderMsg(msg) {
  if (!msg || !msg.text) return;
  const el = document.getElementById('msgs');
  const isMe = msg.username === me?.username;
  const isIRC = msg.source === 'irc';
  const isBot = msg.bot;

  const row = document.createElement('div');
  row.className = 'msg-row'
    + (isMe ? ' mine' : '')
    + (isIRC ? ' irc-msg' : '')
    + (isBot ? ' bot-msg' : '');
  row.dataset.ts = msg.ts;

  // Avatar
  const avDiv = document.createElement('div');
  avDiv.className = 'msg-av' + (isIRC ? ' irc-av' : '') + (isBot ? ' bot-av' : '');
  const av = msg.avatar || '👤';
  if (av.startsWith('data:') || av.startsWith('http')) {
    avDiv.innerHTML = `<img src="${av}" alt="${msg.name||''}">`;
  } else {
    avDiv.textContent = av;
    avDiv.style.fontSize = '20px';
  }
  avDiv.onclick = () => showUserCard(msg);

  // Badge
  const badge = isIRC ? '<span class="msg-badge badge-irc">IRC</span>'
    : isBot ? '<span class="msg-badge badge-bot">BOT</span>'
    : '<span class="msg-badge badge-bc">BC</span>';

  // Text
  const text = formatText(msg.text, msg.fmt || {});

  row.innerHTML = `
    <div class="msg-bub">
      <div class="msg-meta">
        <span class="msg-name" style="color:${msg.color||'var(--accent)'}"
          onclick="showUserCard(${JSON.stringify(msg).replace(/"/g,'&quot;')})">${escHtml(msg.name||msg.username||'?')}</span>
        ${badge}
        <span class="msg-time">${timeSince(msg.ts)}</span>
      </div>
      <div class="bubble">${text}</div>
      ${isIRC ? `<div class="irc-source">via IRC ${msg.channel||''}</div>` : ''}
    </div>`;
  row.prepend(avDiv);
  el.appendChild(row);
}

function formatText(text, fmt) {
  let t = escHtml(text);
  t = t.replace(/(https?:\/\/[^\s]+)/g, url => {
    const yt = url.match(/youtube\.com\/watch\?v=([^&\s]+)|youtu\.be\/([^\s]+)/);
    if (yt) {
      const vid = yt[1]||yt[2];
      return `<a href="${url}" target="_blank" rel="noopener">▶ YouTube</a>`;
    }
    return `<a href="${url}" target="_blank" rel="noopener">${url.length>40?url.slice(0,40)+'…':url}</a>`;
  });
  if (fmt.bold) t = `<b>${t}</b>`;
  if (fmt.italic) t = `<em>${t}</em>`;
  if (fmt.underline) t = `<u>${t}</u>`;
  return t;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollBottom() {
  const el = document.getElementById('msgs');
  if (el) setTimeout(() => el.scrollTop = el.scrollHeight, 30);
}

function scrollIfNear() {
  const el = document.getElementById('msgs');
  if (el && el.scrollTop + el.clientHeight > el.scrollHeight - 120) scrollBottom();
}

/* ══ SEND MESSAGE ══ */
async function sendMsg() {
  const inp = document.getElementById('msginput');
  const text = inp.value.trim();
  if (!text || !me) return;
  inp.value = ''; autoH(inp);

  const room = ROOMS.find(r => r.id === curRoom) || ROOMS[0];
  const ts = Date.now();

  // Build our message
  const msg = {
    username: me.username, name: me.name,
    avatar: me.avatar || '🐒', color: me.color || '#44cc44',
    text, ts, fmt: {...fmt}, britchat: true,
  };

  // Save to Firebase (always)
  fetch(FB + '/bc_msgs/' + curRoom + '.json', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(msg)
  }).catch(() => {});

  // Clear typing
  fetch(FB + '/bc_typing/' + curRoom + '/' + me.username + '.json', { method: 'DELETE' }).catch(() => {});

  // Optimistic render
  renderMsg(msg); scrollBottom();

  // If IRC room — also post to IRC!
  if (room.irc) {
    setStatus('Sending to IRC…', true);
    try {
      const res = await fetch('/api/irc-bridge', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          action: 'send',
          nick: me.name || me.username,
          channel: room.ircChan,
          text,
        })
      });
      const data = await res.json();
      setStatus(data.ok ? '✅ Sent to IRC' : '⚠️ IRC send failed', false);
      setTimeout(() => setStatus('', false), 2000);
    } catch(e) {
      setStatus('⚠️ IRC error', false);
      setTimeout(() => setStatus('', false), 2000);
    }
  }

  // Reset format
  fmt = {bold:false,italic:false,underline:false};
  ['b','i','u'].forEach(k => document.getElementById('fb-'+k)?.classList.remove('on'));
}

function setStatus(text, sending) {
  document.getElementById('input-status-text').textContent = text;
  document.getElementById('sending-dot').classList.toggle('on', sending);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function addEmoji(em) {
  const inp = document.getElementById('msginput');
  inp.value += em; inp.focus(); autoH(inp);
}

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleTyping() {
  if (!me) return;
  fetch(FB + '/bc_typing/' + curRoom + '/' + me.username + '.json', {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(Date.now())
  }).catch(() => {});
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    fetch(FB + '/bc_typing/' + curRoom + '/' + me.username + '.json', { method: 'DELETE' }).catch(() => {});

    document.querySelector('.ov.on:last-child')?.remove();
    updateChip(); showToast('Photo set! 📷');

  r.readAsDataURL(f);
}

  document.getElementById('drawer').classList.toggle('on', drOpen);
}

/* ══ UTILS ══ */
function timeSince(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return new Date(ts).toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}
function showToast(m, d=2500) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', d);
}

/* ══ ADMIN (triple-tap logo) ══ */
let aTap = 0, aTmr = null;
document.getElementById('logo-tap')?.addEventListener('click', () => {
  aTap++; clearTimeout(aTmr); aTmr = setTimeout(() => aTap=0, 800);
  if (aTap >= 3) {
    aTap = 0;
    const pw = prompt('🛡️ Admin password:');
    if (pw === 'BritChatAdmin2025!') showToast('Admin mode ✅');
    else if (pw !== null) alert('Wrong password');
  }
});
