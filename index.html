<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BritWorld 🌍 v0.2 — Walk, Talk, Explore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#2a1810;
  --ink:#1a0e08;
  --grass:#4a7c3c;
  --grass2:#3a6530;
  --path:#b8925a;
  --wood:#8b5a3c;
  --sky:#5fa9d5;
  --accent:#ffc857;
  --accent2:#e63946;
  --brick:#8b3e3e;
  --paper:#f4e8d0;
  --text:#f4e8d0;
  --pixel:'Press Start 2P',monospace;
  --retro:'VT323',monospace;
  --ui:'Outfit',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ui);overflow:hidden;touch-action:none}

/* pixel rendering */
canvas{image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges}

/* ═══ LOGIN SCREEN ═══ */
#login{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}
#login::before{content:'';position:absolute;inset:0;opacity:.4;pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 20% 30%,#fff,transparent),
    radial-gradient(2px 2px at 60% 70%,#fff,transparent),
    radial-gradient(1px 1px at 50% 50%,#fff,transparent),
    radial-gradient(1px 1px at 80% 10%,#fff,transparent),
    radial-gradient(2px 2px at 90% 60%,#fff,transparent),
    radial-gradient(1px 1px at 33% 80%,#fff,transparent),
    radial-gradient(1px 1px at 15% 15%,#fff,transparent);
  background-size:250px 250px;animation:twinkle 6s linear infinite}
@keyframes twinkle{0%{transform:translateY(0)}100%{transform:translateY(-250px)}}

.title-stack{text-align:center;margin-bottom:30px;position:relative;z-index:1}
.world-tag{font-family:var(--pixel);font-size:10px;color:var(--accent);
  letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;
  text-shadow:0 2px 0 rgba(0,0,0,.8)}
.world-title{font-family:var(--pixel);font-size:clamp(32px,9vw,56px);line-height:1.1;
  color:#fff;text-shadow:
    4px 4px 0 var(--accent2),
    8px 8px 0 rgba(0,0,0,.5);
  letter-spacing:2px;margin-bottom:18px}
.world-title span{color:var(--accent)}
.world-sub{font-family:var(--retro);font-size:22px;color:#c8d4e5;
  letter-spacing:1px;line-height:1.2}

.login-card{background:rgba(0,0,0,.6);backdrop-filter:blur(10px);
  border:3px solid var(--accent);border-radius:0;padding:22px;
  width:100%;max-width:380px;position:relative;z-index:1;
  box-shadow:6px 6px 0 rgba(0,0,0,.6)}
.login-label{font-family:var(--pixel);font-size:9px;color:var(--accent);
  letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:8px}
#nick{width:100%;padding:12px;background:#fff;border:3px solid #000;
  color:#000;font-family:var(--retro);font-size:20px;font-weight:700;
  outline:none;margin-bottom:14px;letter-spacing:1px}
#nick:focus{border-color:var(--accent2)}

.avatar-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.av{aspect-ratio:1;background:rgba(255,255,255,.1);border:3px solid transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:32px;transition:all .1s;position:relative}
.av:hover{background:rgba(255,255,255,.2)}
.av.sel{border-color:var(--accent);background:rgba(255,200,87,.2);
  transform:translate(-2px,-2px);box-shadow:4px 4px 0 rgba(0,0,0,.5)}

.enter-btn{width:100%;padding:14px;background:var(--accent2);border:3px solid #000;
  color:#fff;font-family:var(--pixel);font-size:12px;letter-spacing:2px;
  cursor:pointer;transition:all .1s;box-shadow:4px 4px 0 rgba(0,0,0,.6)}
.enter-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 rgba(0,0,0,.6);
  background:#ff4d5a}
.enter-btn:active{transform:translate(2px,2px);box-shadow:0 0 0 rgba(0,0,0,.6)}

/* ═══ GAME WORLD ═══ */
#world{position:fixed;inset:0;display:none;flex-direction:column;z-index:1}
#world.live{display:flex}

.hud{position:absolute;top:0;left:0;right:0;z-index:50;display:flex;
  justify-content:space-between;align-items:center;padding:10px 14px;
  background:linear-gradient(180deg,rgba(0,0,0,.85),transparent);pointer-events:none}
.hud-chip{background:rgba(0,0,0,.7);border:2px solid var(--accent);
  padding:5px 12px;font-family:var(--pixel);font-size:9px;color:var(--accent);
  letter-spacing:1px;pointer-events:auto}
.hud-right{display:flex;gap:8px}
.hud-btn{background:rgba(0,0,0,.7);border:2px solid #fff;color:#fff;
  width:36px;height:36px;font-size:18px;cursor:pointer;pointer-events:auto;
  font-family:var(--pixel);display:flex;align-items:center;justify-content:center}
.hud-btn:hover{background:var(--accent2)}

#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--grass)}
#game{position:absolute;inset:0;width:100%;height:100%}

/* chat bubble */
.bubble{position:absolute;background:#fff;border:2px solid #000;
  padding:4px 8px;font-family:var(--retro);font-size:16px;color:#000;
  font-weight:700;max-width:180px;pointer-events:none;white-space:pre-wrap;
  transform:translate(-50%,-100%);z-index:30;
  filter:drop-shadow(2px 2px 0 rgba(0,0,0,.4))}
.bubble::after{content:'';position:absolute;bottom:-8px;left:50%;
  transform:translateX(-50%);width:0;height:0;
  border-left:8px solid transparent;border-right:8px solid transparent;
  border-top:8px solid #000}
.bubble::before{content:'';position:absolute;bottom:-5px;left:50%;
  transform:translateX(-50%);width:0;height:0;z-index:1;
  border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:6px solid #fff}
.bubble.me{background:var(--accent);border-color:#000}
.bubble.me::before{border-top-color:var(--accent)}

.nametag{position:absolute;background:rgba(0,0,0,.75);color:#fff;
  padding:2px 7px;font-family:var(--pixel);font-size:7px;
  transform:translate(-50%,-100%);pointer-events:none;z-index:25;
  letter-spacing:1px;white-space:nowrap}

/* ═══ CHAT INPUT ═══ */
.chat-bar{position:absolute;bottom:0;left:0;right:0;z-index:40;
  background:linear-gradient(0deg,rgba(0,0,0,.9),rgba(0,0,0,.7));
  padding:10px 12px;display:flex;gap:8px;align-items:center}
#chat-input{flex:1;padding:10px 14px;background:#fff;border:3px solid #000;
  color:#000;font-family:var(--retro);font-size:18px;font-weight:700;
  outline:none;letter-spacing:.5px}
#chat-input:focus{border-color:var(--accent)}
.send-btn{padding:10px 16px;background:var(--accent);border:3px solid #000;
  color:#000;font-family:var(--pixel);font-size:10px;cursor:pointer;
  letter-spacing:1px}
.send-btn:active{transform:translate(1px,1px)}

/* ═══ JOYSTICK ═══ */
#joy{position:absolute;bottom:70px;left:14px;width:110px;height:110px;
  z-index:35;touch-action:none;user-select:none}
.joy-base{position:absolute;inset:0;background:rgba(0,0,0,.35);
  border:3px solid rgba(255,255,255,.4);border-radius:50%;
  backdrop-filter:blur(4px)}
.joy-stick{position:absolute;top:50%;left:50%;width:44px;height:44px;
  background:var(--accent);border:3px solid #000;border-radius:50%;
  transform:translate(-50%,-50%);box-shadow:0 3px 0 rgba(0,0,0,.5);
  transition:box-shadow .1s}

/* desktop hide joystick */
@media(min-width:700px) and (hover:hover){
  #joy{display:none}
  .desktop-hint{display:block}
}
.desktop-hint{display:none;position:absolute;bottom:70px;left:14px;
  background:rgba(0,0,0,.75);padding:8px 12px;border:2px solid var(--accent);
  font-family:var(--pixel);font-size:8px;color:var(--accent);
  letter-spacing:1px;z-index:35;line-height:1.6}

/* ═══ ROOM LABEL ═══ */
.room-badge{position:absolute;top:60px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);border:2px solid var(--accent);
  padding:5px 14px;font-family:var(--pixel);font-size:10px;
  color:var(--accent);letter-spacing:2px;z-index:30;
  animation:badgeSlide .8s ease-out}
@keyframes badgeSlide{0%{transform:translate(-50%,-40px);opacity:0}100%{transform:translate(-50%,0);opacity:1}}

/* ═══ LOADING ═══ */
#loading{position:fixed;inset:0;z-index:999;display:flex;
  align-items:center;justify-content:center;background:#000}
.load-text{font-family:var(--pixel);font-size:14px;color:var(--accent);
  letter-spacing:3px;animation:blink 0.8s steps(2) infinite}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="load-text">LOADING...</div></div>

<!-- LOGIN -->
<div id="login">
  <div class="title-stack">
    <div class="world-tag">◆ WELCOME TO ◆</div>
    <h1 class="world-title">BRIT<span>WORLD</span></h1>
    <div class="world-sub">A walkable pixel world for British chat</div>
  </div>

  <div class="login-card">
    <span class="login-label">▸ YOUR NAME</span>
    <input id="nick" type="text" placeholder="Type your name..." maxlength="12" autocomplete="off" autocapitalize="off">

    <span class="login-label">▸ PICK YOUR CHARACTER</span>
    <div class="avatar-picker" id="avatar-grid"></div>

    <button class="enter-btn" onclick="enterWorld()">▸ ENTER WORLD</button>
  </div>
</div>

<!-- WORLD -->
<div id="world">
  <div class="hud">
    <div class="hud-chip" id="online-count">● 0 ONLINE</div>
    <div class="hud-right">
      <button class="hud-btn" onclick="showHelp()" title="Help">?</button>
      <button class="hud-btn" onclick="leaveWorld()" title="Exit">×</button>
    </div>
  </div>

  <div class="room-badge" id="room-badge">🍺 THE VILLAGE</div>

  <div id="canvas-wrap">
    <canvas id="game"></canvas>
  </div>

  <div class="desktop-hint">ARROWS or WASD to walk<br>ENTER to chat</div>
  <div id="joy"><div class="joy-base"></div><div class="joy-stick" id="joy-stick"></div></div>

  <div class="chat-bar">
    <input id="chat-input" type="text" placeholder="Press ENTER to chat..." maxlength="120" autocomplete="off">
    <button class="send-btn" onclick="sendChat()">SEND</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   BRITWORLD — v0.1
   Multiplayer 2D pixel world via Firebase
═══════════════════════════════════════════════════ */

/* ── Firebase setup (same DB as BritChat) ── */
const FB_CFG = { databaseURL: 'https://britchat-6faa5-default-rtdb.firebaseio.com' };
let fbApp, fbDb;

function initFB() {
  if (fbApp) return;
  fbApp = firebase.initializeApp(FB_CFG, 'britworld');
  fbDb  = firebase.database(fbApp);
}

/* ── Avatar choices ── */
const AVATARS = ['🦊','🐻','🐼','🐸','🐵','🦉','🐙','🦁','🐯','🐨','🐰','🐺'];
let selectedAvatar = '🦊';

function renderAvatars() {
  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = AVATARS.map((a,i) =>
    `<div class="av${i===0?' sel':''}" onclick="pickAvatar(this,'${a}')">${a}</div>`
  ).join('');
}
function pickAvatar(el, a) {
  document.querySelectorAll('.av').forEach(x => x.classList.remove('sel'));
  el.classList.add('sel');
  selectedAvatar = a;
}

/* ── World state ── */
// Each room is a separate area with its own size and scenery
const ROOMS = {
  village: {
    name: '🍺 THE VILLAGE',
    width: 1400, height: 900,
    spawn: { x: 700, y: 450 },
    bgColour: '#4a7c3c',
    theme: 'outdoor',
    doors: [
      { x: 310, y: 260, w: 50, h: 40, to: 'pub',     label: 'Enter Pub' },
      { x: 610, y: 280, w: 50, h: 40, to: 'shop',    label: 'Enter Shop' },
      { x: 930, y: 270, w: 50, h: 40, to: 'arcade',  label: 'Enter Arcade' },
      { x: 1200, y: 280, w: 50, h: 40, to: 'gallery', label: 'Enter Gallery' },
    ]
  },
  pub: {
    name: '🍺 THE PUB',
    width: 800, height: 600,
    spawn: { x: 400, y: 520 },
    bgColour: '#4a2a1a',
    theme: 'pub',
    doors: [
      { x: 370, y: 540, w: 60, h: 50, to: 'village', label: 'Leave Pub' },
    ]
  },
  shop: {
    name: '🏪 THE SHOP',
    width: 700, height: 500,
    spawn: { x: 350, y: 430 },
    bgColour: '#1a2e3e',
    theme: 'shop',
    doors: [
      { x: 320, y: 450, w: 60, h: 40, to: 'village', label: 'Leave Shop' },
    ]
  },
  arcade: {
    name: '🎮 THE ARCADE',
    width: 800, height: 550,
    spawn: { x: 400, y: 480 },
    bgColour: '#1a0e2e',
    theme: 'arcade',
    doors: [
      { x: 370, y: 500, w: 60, h: 40, to: 'village', label: 'Leave Arcade' },
    ]
  },
  gallery: {
    name: '🎨 THE GALLERY',
    width: 900, height: 600,
    spawn: { x: 450, y: 520 },
    bgColour: '#f4e8d0',
    theme: 'gallery',
    doors: [
      { x: 420, y: 540, w: 60, h: 40, to: 'village', label: 'Leave Gallery' },
    ]
  }
};

let currentRoom = 'village';
let WORLD = ROOMS.village;

// My player
let me = { id: null, nick: 'Guest', avatar: '🦊', x: 700, y: 450, dir: 0, walking: false, room: 'village' };
// All other players keyed by id (only those in my current room)
let players = {};
// Chat bubbles: id -> { text, until }
let bubbles = {};
// Door the player is currently near (if any)
let nearDoor = null;
// Transition state
let transitioning = false;

/* ── Canvas setup ── */
let canvas, ctx;
let camera = { x: 0, y: 0 };
let lastTime = 0;
let keys = {};
let joyVec = { x: 0, y: 0 };

function initCanvas() {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}
function resizeCanvas() {
  if (!canvas) return;
  const wrap = document.getElementById('canvas-wrap');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = wrap.clientWidth  * dpr;
  canvas.height = wrap.clientHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
}

/* ── Draw the world ── */
function drawWorld() {
  const vw = canvas.clientWidth;
  const vh = canvas.clientHeight;

  // Camera follows me, clamped to room bounds
  camera.x = Math.max(0, Math.min(Math.max(0, WORLD.width - vw), me.x - vw/2));
  camera.y = Math.max(0, Math.min(Math.max(0, WORLD.height - vh), me.y - vh/2));

  ctx.clearRect(0, 0, vw, vh);

  // Room-specific scene
  if (WORLD.theme === 'outdoor')      drawOutdoor(vw, vh);
  else if (WORLD.theme === 'pub')     drawPubInterior(vw, vh);
  else if (WORLD.theme === 'shop')    drawShopInterior(vw, vh);
  else if (WORLD.theme === 'arcade')  drawArcadeInterior(vw, vh);
  else if (WORLD.theme === 'gallery') drawGalleryInterior(vw, vh);

  // Draw doors
  drawDoors(vw, vh);

  // Players sorted by Y for pseudo-3D
  const allPlayers = [me, ...Object.values(players)].sort((a,b) => a.y - b.y);
  for (const p of allPlayers) {
    drawPlayer(p);
  }

  // "Press E to enter" hint
  if (nearDoor && !transitioning) {
    const bx = nearDoor.x + nearDoor.w/2 - camera.x;
    const by = nearDoor.y - camera.y - 10;
    ctx.fillStyle = 'rgba(0,0,0,.85)';
    ctx.fillRect(bx - 95, by - 32, 190, 26);
    ctx.strokeStyle = '#ffc857';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx - 95, by - 32, 190, 26);
    ctx.fillStyle = '#ffc857';
    ctx.font = 'bold 10px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('[E] ' + nearDoor.label, bx, by - 15);
  }

  // Transition overlay
  if (transitioning) {
    ctx.fillStyle = 'rgba(0,0,0,' + Math.min(1, transitioning/500) + ')';
    ctx.fillRect(0, 0, vw, vh);
  }
}

/* ── Outdoor village ── */
function drawOutdoor(vw, vh) {
  ctx.fillStyle = '#4a7c3c';
  ctx.fillRect(0, 0, vw, vh);
  const gx = -((camera.x) % 32);
  const gy = -((camera.y) % 32);
  ctx.fillStyle = '#3a6530';
  for (let x = gx; x < vw; x += 32) {
    for (let y = gy; y < vh; y += 32) {
      if (((x+camera.x)/32 + (y+camera.y)/32) % 2 === 0) {
        ctx.fillRect(x, y, 16, 16);
        ctx.fillRect(x+16, y+16, 16, 16);
      }
    }
  }
  const pathY = 400 - camera.y;
  ctx.fillStyle = '#b8925a';
  ctx.fillRect(0, pathY, vw, 100);
  ctx.fillStyle = '#9a7544';
  for (let x = (-camera.x) % 16; x < vw; x += 32) {
    ctx.fillRect(x, pathY + 20, 8, 8);
    ctx.fillRect(x + 12, pathY + 70, 8, 8);
    ctx.fillRect(x + 6, pathY + 45, 8, 8);
  }
  drawBuilding(200 - camera.x, 100 - camera.y, 220, 160, '#8b3e3e', '🍺 THE PUB', '#ffc857');
  drawBuilding(500 - camera.x, 120 - camera.y, 220, 160, '#3e6b8b', '🏪 SHOP', '#fff');
  drawBuilding(820 - camera.x, 110 - camera.y, 220, 160, '#6b3e8b', '🎮 ARCADE', '#ff9ad6');
  drawBuilding(1090 - camera.x, 120 - camera.y, 220, 160, '#3e8b6b', '🎨 GALLERY', '#fff');
  drawTree(120 - camera.x, 620 - camera.y);
  drawTree(1280 - camera.x, 580 - camera.y);
  drawTree(430 - camera.x, 700 - camera.y);
  drawTree(900 - camera.x, 720 - camera.y);
  drawTree(650 - camera.x, 780 - camera.y);
  const spawnX = 700 - camera.x;
  const spawnY = 450 - camera.y;
  ctx.fillStyle = 'rgba(255,200,87,0.3)';
  ctx.beginPath(); ctx.arc(spawnX, spawnY, 40, 0, Math.PI*2); ctx.fill();
}

/* ── Pub interior ── */
function drawPubInterior(vw, vh) {
  ctx.fillStyle = '#6b4226';
  ctx.fillRect(0, 0, vw, vh);
  ctx.fillStyle = '#5a3620';
  for (let y = (-camera.y) % 40; y < vh; y += 40) {
    ctx.fillRect(0, y, vw, 2);
  }
  const wallH = 100, wallY = -camera.y;
  if (wallY + wallH > 0) {
    ctx.fillStyle = '#8b3e3e';
    ctx.fillRect(0, wallY, vw, wallH);
    ctx.fillStyle = '#6b2e2e';
    for (let y = 0; y < wallH; y += 20) {
      for (let x = ((y/20 % 2) ? 0 : 20) - (camera.x % 40); x < vw; x += 40) {
        ctx.fillRect(x, wallY + y, 38, 2);
      }
      ctx.fillRect(0, wallY + y, vw, 1);
    }
  }
  // Bar counter
  const barX = 60 - camera.x, barY = 130 - camera.y, barW = 680, barH = 55;
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(barX, barY + 4, barW, barH);
  ctx.fillStyle = '#8b5a3c';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = '#c89060';
  ctx.fillRect(barX, barY, barW, 6);
  // Beer taps
  for (let i = 0; i < 5; i++) {
    const tx = barX + 100 + i * 100;
    ctx.fillStyle = '#ffc857';
    ctx.fillRect(tx, barY - 18, 5, 22);
    ctx.fillRect(tx - 4, barY - 20, 13, 4);
  }
  // "BAR" sign
  ctx.fillStyle = '#ffc857';
  ctx.font = 'bold 14px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('🍺 BAR', barX + barW/2, barY - 35);
  // Fireplace
  const fx = 710 - camera.x, fy = 120 - camera.y;
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(fx, fy, 60, 70);
  ctx.fillStyle = '#ff6b35';
  ctx.fillRect(fx + 10, fy + 25, 40, 40);
  ctx.fillStyle = '#ffc857';
  ctx.fillRect(fx + 15, fy + 35, 30, 28);
  ctx.fillStyle = '#fff1a8';
  ctx.fillRect(fx + 22, fy + 45, 16, 14);
  // Tables
  drawPubTable(150 - camera.x, 350 - camera.y);
  drawPubTable(380 - camera.x, 380 - camera.y);
  drawPubTable(600 - camera.x, 360 - camera.y);
  // Dartboard
  const dx = 750 - camera.x, dy = 230 - camera.y;
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(dx, dy, 20, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(dx, dy, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e63946'; ctx.beginPath(); ctx.arc(dx, dy, 7, 0, Math.PI*2); ctx.fill();
}
function drawPubTable(x, y) {
  ctx.fillStyle = 'rgba(0,0,0,0.35)';

function drawFrame(x, y, w, h, colours) {
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(x - 4, y - 4, w + 8, h + 8);
  ctx.fillStyle = '#8b5a3c';
  ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
  const g = ctx.createLinearGradient(x, y, x + w, y + h);
  g.addColorStop(0, colours[0]);
  g.addColorStop(1, colours[1]);
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.arc(x + w/3, y + h/2, Math.min(w,h)/5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(x + w*2/3 - 6, y + h*2/3 - 6, 12, 12);
}

/* ── Doors with glow + hint ── */
function drawDoors(vw, vh) {
  for (const d of WORLD.doors) {
    const sx = d.x - camera.x;
    const sy = d.y - camera.y;
    if (sx + d.w < 0 || sx > vw || sy + d.h < 0 || sy > vh) continue;
    const t = (Date.now() / 500) % (Math.PI * 2);
    const pulse = Math.sin(t) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255, 200, 87, ${pulse * 0.3})`;
    ctx.fillRect(sx - 4, sy - 4, d.w + 8, d.h + 8);
    ctx.strokeStyle = '#ffc857';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, d.w, d.h);
    ctx.fillStyle = '#5a3620';
    ctx.fillRect(sx + 4, sy + 4, d.w - 8, d.h - 8);
    ctx.fillStyle = '#ffc857';
    ctx.fillRect(sx + d.w - 12, sy + d.h/2 - 2, 3, 4);
    const iconMap = { pub:'🍺', shop:'🏪', arcade:'🎮', gallery:'🎨', village:'🌳' };
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.fillText(iconMap[d.to] || '🚪', sx + d.w/2, sy - 8);
  }
}

function drawBuilding(x, y, w, h, wallColour, label, labelColour) {
  // shadow

  ctx.fillRect(x+6, y+h+2, w, 12);

  // walls
  ctx.fillStyle = wallColour;
  ctx.fillRect(x, y, w, h);
  // darker base

  ctx.fillRect(x, y+h-20, w, 20);
  // roof (triangular)
  ctx.fillStyle = '#5a3226';
  ctx.beginPath();
  ctx.moveTo(x-10, y);
  ctx.lineTo(x + w/2, y - 30);
  ctx.lineTo(x+w+10, y);
  ctx.closePath();
  ctx.fill();
  // roof tiles
  ctx.fillStyle = '#6b3a2e';
  ctx.beginPath();
  ctx.moveTo(x-5, y);
  ctx.lineTo(x + w/2, y - 20);
  ctx.lineTo(x+w+5, y);
  ctx.closePath();
  ctx.fill();

  // door
  const doorW = 36, doorH = 50;
  const doorX = x + w/2 - doorW/2;
  const doorY = y + h - doorH;
  ctx.fillStyle = '#5a3a20';
  ctx.fillRect(doorX, doorY, doorW, doorH);
  ctx.fillStyle = '#ffc857';
  ctx.fillRect(doorX + doorW - 8, doorY + doorH/2 - 2, 4, 4);

  // windows
  ctx.fillStyle = '#c8d4e5';
  ctx.fillRect(x + 20, y + 20, 30, 30);
  ctx.fillRect(x + w - 50, y + 20, 30, 30);
  ctx.strokeStyle = '#1a0e08';
  ctx.lineWidth = 2;
  ctx.strokeRect(x + 20, y + 20, 30, 30);
  ctx.strokeRect(x + w - 50, y + 20, 30, 30);
  // window cross
  ctx.beginPath();
  ctx.moveTo(x + 35, y + 20); ctx.lineTo(x + 35, y + 50);
  ctx.moveTo(x + 20, y + 35); ctx.lineTo(x + 50, y + 35);
  ctx.moveTo(x + w - 35, y + 20); ctx.lineTo(x + w - 35, y + 50);
  ctx.moveTo(x + w - 50, y + 35); ctx.lineTo(x + w - 20, y + 35);
  ctx.stroke();

  // label
  ctx.fillStyle = labelColour;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.font = 'bold 14px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.strokeText(label, x + w/2, y - 40);
  ctx.fillText(label, x + w/2, y - 40);
}

function drawPlayer(p) {
  const sx = p.x - camera.x;
  const sy = p.y - camera.y;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + 14, 14, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // body (circle)
  const isMe = p.id === me.id;
  ctx.fillStyle = isMe ? '#ffc857' : '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(sx, sy, 14, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();

  // avatar emoji
  ctx.font = '20px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.avatar || '🦊', sx, sy + 1);

  // walking bounce
  if (p.walking) {
    const bounce = Math.sin(Date.now() / 100) * 2;
    ctx.translate(0, bounce);
  }

  // nametag
  const tag = document.getElementById('tag-'+p.id);
  if (tag) {
    tag.style.left = sx + 'px';
    tag.style.top = (sy - 20) + 'px';
  }

  // chat bubble
  const b = bubbles[p.id];
  if (b && b.until > Date.now()) {
    const bub = document.getElementById('bub-'+p.id);
    if (bub) {
      bub.style.left = sx + 'px';
      bub.style.top = (sy - 35) + 'px';
      bub.style.display = 'block';
    }
  } else {
    const bub = document.getElementById('bub-'+p.id);
    if (bub) bub.style.display = 'none';
  }
}

/* ── Game loop ── */
function gameLoop(t) {
  const dt = Math.min(0.05, (t - lastTime) / 1000);
  lastTime = t;

  updateMe(dt);
  drawWorld();

  requestAnimationFrame(gameLoop);
}

/* ── Movement ── */
const SPEED = 160; // pixels per second

function updateMe(dt) {
  if (transitioning) return;

  let dx = 0, dy = 0;
  if (keys.ArrowUp    || keys.w || joyVec.y < -0.2) dy -= 1;
  if (keys.ArrowDown  || keys.s || joyVec.y >  0.2) dy += 1;
  if (keys.ArrowLeft  || keys.a || joyVec.x < -0.2) dx -= 1;
  if (keys.ArrowRight || keys.d || joyVec.x >  0.2) dx += 1;

  if (Math.abs(joyVec.x) > 0.2 || Math.abs(joyVec.y) > 0.2) {
    dx = joyVec.x;
    dy = joyVec.y;
  }

  const mag = Math.hypot(dx, dy);
  if (mag > 0) {
    dx /= mag; dy /= mag;
    me.x += dx * SPEED * dt;
    me.y += dy * SPEED * dt;
    me.walking = true;
  } else {
    me.walking = false;
  }

  // Clamp to current room bounds
  me.x = Math.max(20, Math.min(WORLD.width - 20, me.x));
  me.y = Math.max(20, Math.min(WORLD.height - 20, me.y));

  // Check if near a door
  nearDoor = null;
  for (const d of WORLD.doors) {
    if (me.x > d.x - 30 && me.x < d.x + d.w + 30 &&
        me.y > d.y - 30 && me.y < d.y + d.h + 30) {
      nearDoor = d;
      break;
    }
  }

  syncMe();
}

/* ── Firebase sync ── */
let lastSync = 0;
function syncMe() {
  if (!fbDb || !me.id) return;
  const now = Date.now();
  if (now - lastSync < 80) return; // ~12 updates/sec
  lastSync = now;
  fbDb.ref('bw_players/' + me.id).set({
    nick: me.nick, avatar: me.avatar,
    x: Math.round(me.x), y: Math.round(me.y),
    walking: me.walking, room: currentRoom, ts: now
  });
}

let playersListener = null;
function listenPlayers() {
  if (playersListener) fbDb.ref('bw_players').off('value', playersListener);
  playersListener = fbDb.ref('bw_players').on('value', snap => {
    const data = snap.val() || {};
    const now = Date.now();
    const newPlayers = {};
    Object.entries(data).forEach(([id, p]) => {
      if (id === me.id) return;
      if (!p || !p.ts || (now - p.ts) > 30000) return;
      // Only show players in the SAME room as me
      if ((p.room || 'village') !== currentRoom) return;
      newPlayers[id] = { id, ...p };
    });
    Object.keys(newPlayers).forEach(id => ensurePlayerDom(newPlayers[id]));
    Object.keys(players).forEach(id => {
      if (!newPlayers[id]) {
        const tag = document.getElementById('tag-'+id); if (tag) tag.remove();
        const bub = document.getElementById('bub-'+id); if (bub) bub.remove();
      }
    });
    players = newPlayers;
    updateOnlineCount();
  });
}

/* ── Clear other players' DOM (used on room change) ── */
function clearOtherPlayerDom() {
  Object.keys(players).forEach(id => {
    const tag = document.getElementById('tag-'+id); if (tag) tag.remove();
    const bub = document.getElementById('bub-'+id); if (bub) bub.remove();
  });
  players = {};
}

/* ── Change room (with fade transition) ── */
function changeRoom(toRoomKey) {
  if (transitioning) return;
  if (!ROOMS[toRoomKey]) return;

  transitioning = 1;
  const fadeOut = setInterval(() => {
    transitioning += 50;
    if (transitioning >= 500) {
      clearInterval(fadeOut);
      // Do the swap
      clearOtherPlayerDom();
      currentRoom = toRoomKey;
      WORLD = ROOMS[toRoomKey];
      me.room = toRoomKey;
      me.x = WORLD.spawn.x;
      me.y = WORLD.spawn.y;
      nearDoor = null;
      // Update badge
      const badge = document.getElementById('room-badge');
      badge.textContent = WORLD.name;
      badge.style.animation = 'none';
      void badge.offsetWidth;
      badge.style.animation = 'badgeSlide .8s ease-out';
      // Sync new room to firebase
      syncMe();
      // Refresh listeners for new room
      listenPlayers();
      listenChat();

      // Fade in
      const fadeIn = setInterval(() => {
        transitioning -= 50;
        if (transitioning <= 0) {
          transitioning = 0;
          clearInterval(fadeIn);
        }
      }, 20);
    }
  }, 20);
}

function ensurePlayerDom(p) {
  if (!document.getElementById('tag-'+p.id)) {
    const tag = document.createElement('div');
    tag.id = 'tag-'+p.id;
    tag.className = 'nametag';
    tag.textContent = p.nick;
    document.getElementById('canvas-wrap').appendChild(tag);
  } else {
    document.getElementById('tag-'+p.id).textContent = p.nick;
  }
  if (!document.getElementById('bub-'+p.id)) {
    const bub = document.createElement('div');
    bub.id = 'bub-'+p.id;
    bub.className = 'bubble';
    bub.style.display = 'none';
    document.getElementById('canvas-wrap').appendChild(bub);
  }
}

function ensureMyDom() {
  if (!document.getElementById('tag-'+me.id)) {
    const tag = document.createElement('div');
    tag.id = 'tag-'+me.id;
    tag.className = 'nametag';
    tag.textContent = me.nick + ' (you)';
    document.getElementById('canvas-wrap').appendChild(tag);
  }
  if (!document.getElementById('bub-'+me.id)) {
    const bub = document.createElement('div');
    bub.id = 'bub-'+me.id;
    bub.className = 'bubble me';
    bub.style.display = 'none';
    document.getElementById('canvas-wrap').appendChild(bub);
  }
}

function updateOnlineCount() {
  const total = 1 + Object.keys(players).length;
  document.getElementById('online-count').textContent = `● ${total} ONLINE`;
}

/* ── Chat (room-scoped) ── */
let chatListener = null;
let chatRef = null;
function listenChat() {
  if (chatListener && chatRef) chatRef.off('child_added', chatListener);
  chatRef = fbDb.ref('bw_chat/' + currentRoom).limitToLast(40);
  chatListener = chatRef.on('child_added', snap => {
    const m = snap.val();
    if (!m || !m.id || !m.text) return;
    if (Date.now() - m.ts > 8000) return;
    bubbles[m.id] = { text: m.text, until: Date.now() + 5000 };
    const bub = document.getElementById('bub-'+m.id);
    if (bub) { bub.textContent = m.text; }
    setTimeout(() => { snap.ref.remove().catch(() => {}); }, 30000);
  });
}

function sendChat() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text || !fbDb) return;
  inp.value = '';
  fbDb.ref('bw_chat/' + currentRoom).push({
    id: me.id, nick: me.nick, text, ts: Date.now()
  });
  bubbles[me.id] = { text, until: Date.now() + 5000 };
  const bub = document.getElementById('bub-'+me.id);
  if (bub) bub.textContent = text;
}

/* ── Input handlers ── */
function initInput() {
  document.addEventListener('keydown', e => {
    if (document.activeElement === document.getElementById('chat-input')) {
      if (e.key === 'Enter') { sendChat(); e.preventDefault(); }
      if (e.key === 'Escape') document.getElementById('chat-input').blur();
      return;
    }
    keys[e.key] = true;
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'Enter') {
      document.getElementById('chat-input').focus();
      e.preventDefault();
    }
    if (e.key.toLowerCase() === 'e') {
      if (nearDoor && !transitioning) {
        changeRoom(nearDoor.to);
      }
    }
  });
  document.addEventListener('keyup', e => {
    keys[e.key] = false;
    keys[e.key.toLowerCase()] = false;
  });

  // Joystick
  const joy = document.getElementById('joy');
  const stick = document.getElementById('joy-stick');
  let active = false, centre = null;
  const onStart = (e) => {
    active = true;
    const rect = joy.getBoundingClientRect();
    centre = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
    e.preventDefault();
  };
  const onMove = (e) => {
    if (!active || !centre) return;
    const p = e.touches ? e.touches[0] : e;
    const dx = p.clientX - centre.x;
    const dy = p.clientY - centre.y;
    const max = 35;
    const d = Math.min(max, Math.hypot(dx, dy));
    const ang = Math.atan2(dy, dx);
    const sx = Math.cos(ang) * d;
    const sy = Math.sin(ang) * d;
    stick.style.transform = `translate(calc(-50% + ${sx}px), calc(-50% + ${sy}px))`;
    joyVec.x = sx / max;
    joyVec.y = sy / max;
    e.preventDefault();
  };
  const onEnd = () => {
    active = false;
    joyVec = { x: 0, y: 0 };
    stick.style.transform = 'translate(-50%,-50%)';
  };
  joy.addEventListener('touchstart', onStart, { passive: false });
  joy.addEventListener('touchmove',  onMove,  { passive: false });
  joy.addEventListener('touchend',   onEnd);
  joy.addEventListener('mousedown',  onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onEnd);

  // Tap on door button (for mobile users)
  document.getElementById('game').addEventListener('click', e => {
    if (nearDoor && !transitioning) {
      changeRoom(nearDoor.to);
    }
  });
}

/* ── Enter world flow ── */
function enterWorld() {
  const nick = document.getElementById('nick').value.trim();
  if (!nick) {
    document.getElementById('nick').focus();
    return;
  }
  me.nick = nick;
  me.avatar = selectedAvatar;
  me.id = 'p_' + Math.random().toString(36).slice(2, 10);
  me.room = 'village';

  // Start in village
  currentRoom = 'village';
  WORLD = ROOMS.village;
  me.x = WORLD.spawn.x;
  me.y = WORLD.spawn.y;

  localStorage.setItem('bw_nick', nick);
  localStorage.setItem('bw_avatar', selectedAvatar);

  initFB();
  fbDb.ref('bw_players/' + me.id).onDisconnect().remove();

  document.getElementById('login').style.display = 'none';
  document.getElementById('world').classList.add('live');
  document.getElementById('room-badge').textContent = WORLD.name;

  setTimeout(() => {
    initCanvas();
    ensureMyDom();
    listenPlayers();
    listenChat();
    requestAnimationFrame(gameLoop);
  }, 50);
}

function leaveWorld() {
  if (fbDb && me.id) {
    fbDb.ref('bw_players/' + me.id).remove();
  }
  location.reload();
}

/* ── Startup ── */
function startup() {
  renderAvatars();
  // Restore previous nick/avatar
  const savedNick = localStorage.getItem('bw_nick');
  const savedAv = localStorage.getItem('bw_avatar');
  if (savedNick) document.getElementById('nick').value = savedNick;
  if (savedAv) {
    const idx = AVATARS.indexOf(savedAv);
    if (idx >= 0) {
      const els = document.querySelectorAll('.av');
      if (els[idx]) {
        document.querySelectorAll('.av').forEach(x => x.classList.remove('sel'));
        els[idx].classList.add('sel');
        selectedAvatar = savedAv;
      }
    }
  }
  initInput();

  // hide loading
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
  }, 400);

  // Enter on nick field
  document.getElementById('nick').addEventListener('keydown', e => {
    if (e.key === 'Enter') enterWorld();
  });
}

document.addEventListener('DOMContentLoaded', startup);
</script>
